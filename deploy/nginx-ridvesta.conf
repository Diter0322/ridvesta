server {
    listen 80;
    server_name emasharian.com www.emasharian.com;

    root /var/www/emasharian.com/dist;
    index index.html;

    # Main SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets (long cache)
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Optional: common static files cache
    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|webp|woff2?)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }
}
